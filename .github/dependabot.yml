version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge"
    groups:
      runtime-minor:
        patterns:
          - "express"
          - "helmet"
          - "multer"
        update-types:
          - "minor"
          - "patch"
      runtime-major:
        patterns:
          - "express"
          - "helmet"
          - "multer"
        update-types:
          - "major"
      dev-minor:
        patterns:
          - "jest"
          - "supertest"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # GH-5: monaco-editor major versions require manual verification
      # because the bundled vs/ directory must be synced.
      - dependency-name: "monaco-editor"
        update-types: ["version-update:semver-major"]
